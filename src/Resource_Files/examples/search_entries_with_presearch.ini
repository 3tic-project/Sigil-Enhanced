[search_entries]
1\Name=示例/字符转化/# 预搜索表达式如果设置了捕获组，则取第一个捕获组为预搜索范围/
2\Name=示例/字符转化/#全角转义符 \\F 和半角转义符 \\H 是Sigil修改版专有/
3\Name=示例/字符转化/全角转半角
3\PreFind=(?s)<p>(.*?)</p>
3\Find=.+
3\Replace=\\H\\0\\E
3\Controls=PS CF DN
4\Name=示例/字符转化/全角转半角
4\PreFind=(?s)<p>(.*?)</p>
4\Find=.+
4\Replace=\\F\\0\\E
4\Controls=PS CF DN
5\Name=示例/字符转化/大写转小写
5\PreFind=(?s)<p>(.*?)</p>
5\Find=\\w+
5\Replace=\\L\\0\\E
5\Controls=PS CF DN
6\Name=示例/字符转化/小写转大写
6\PreFind=(?s)<p>(.*?)</p>
6\Find=\\w+
6\Replace=\\U\\0\\E
6\Controls=PS CF DN
7\Name=示例/字符转化/首字母大写
7\PreFind=(?s)<p>(.*?)</p>
7\Find=[\\w\\s]+
7\Replace=\\u\\0
7\Controls=PS CF DN
8\Name=示例/字符转化/首字母小写
8\PreFind=(?s)<p>(.*?)</p>
8\Find=[\\w\\s]+
8\Replace=\\l\\0
8\Controls=PS CF DN
9\Name=示例/对称符号检查与纠正（非嵌套类型）/# 这组表达支持所有非嵌套类型的对称引号错误，包括引号缺失、引号方向错误等等。/
10\Name=示例/对称符号检查与纠正（非嵌套类型）/# 这组表达式建议配合【预览模式】使用，勾选【预览】再点击【替换所有】，可筛出所有对称引号错误项，便于检查。/
11\Name=示例/对称符号检查与纠正（非嵌套类型）/# 请注意段末缺引号或者段末孤引号不一定是错误，请在预览中结合上下文斟酌是否应用替换。/
12\Name=示例/对称符号检查与纠正（非嵌套类型）/双引号纠正
12\PreFind=(?sU)<p.*>(.*)</p>
12\Find=(?|^([^“”]*)”$(?#末尾孤引号匹配)|[“”]([^“”]*)(?:[“”]|$)(?#强制成对匹配))
12\Replace=“\\1”
12\Controls=PS AH DN
13\Name=示例/对称符号检查与纠正（非嵌套类型）/单引号纠正
13\PreFind=(?sU)<p.*>(.*)</p>
13\Find=(?|^([^‘’]*)’$(?#末尾孤引号匹配)|[‘’]([^‘’*)(?:[‘’]|$)(?#强制成对匹配))
13\Replace=‘\\1’
13\Controls=PS AH DN
14\Name=示例/对称符号检查与纠正（非嵌套类型）/日文引号纠正
14\PreFind=(?sU)<p.*>(.*)</p>
14\Find=(?|^([^「 」]*)」$(?#末尾孤引号匹配)|[「 」]([^「 」]*)(?:[「 」]|$)(?#强制成对匹配))
14\Replace=「 \\1」
14\Controls=PS DN AH
15\Name=示例/对称符号检查与纠正（非嵌套类型）/日文书名号纠正
15\PreFind=(?sU)<p.*>(.*)</p>
15\Find=(?|^([^『 』]*)』$(?#末尾孤引号匹配)|[『 』]([^『 』]*)(?:[『 』]|$)(?#强制成对匹配))
15\Replace=『 \\1』
15\Controls=PS AH DN
16\Name=示例/对称符号检查与纠正（非嵌套类型）/中文括号纠正
16\PreFind=(?sU)<p.*>(.*)</p>
16\Find=[（）]([^（）]*)(?:[（）]|$)(?#强制成对匹配)
16\Replace=（\\1）
16\Controls=PS AH DN
17\Name=示例/对称符号检查与纠正（非嵌套类型）/英文括号纠正
17\PreFind=(?sU)<p.*>(.*)</p>
17\Find=[\\(\\)]([^\\(\\)]*)(?:[\\(\\)]|$)(?#强制成对匹配)
17\Replace=(\\1)
17\Controls=PS AH DN
18\Name=示例/对称符号检查与纠正（非嵌套类型）/中英括号混搭纠中文口号
18\PreFind=(?sU)<p.*>(.*)</p>
18\Find=[（）\\(\\)]]([^（）\\(\\)]*)(?:[（）\\(\\)]|$)(?#强制成对匹配)
18\Replace=（\\1）
18\Controls=PS AH DN
19\Name=示例/对称符号检查与纠正（非嵌套类型）/中英双引号混搭纠中文引号
19\PreFind=(?sU)<p.*>(.*)</p>
19\Find=(?|^([^“”\"]*)[”\"]$(?#末尾孤引号匹配)|[“”\"]([^“”\"]*)(?:[“”\"]|$)(?#强制成对匹配))
19\Replace=“\\1”
19\Controls=PS AH DN
20\Name=示例/对称符号检查（嵌套类型）/# 对层引号的嵌套引用，应当先于非嵌套类型执行，检出嵌套类型后再处理非嵌套类型/
21\Name=示例/对称符号检查（嵌套类型）/# 嵌套类型的对称引号指日文轻小说中偶尔出现的引号非正规用法，例如「「「 !!!!!」 」 」，表示声音震撼或者表示声音恢弘层叠/
22\Name=示例/对称符号检查（嵌套类型）/日文引号多层嵌套
22\PreFind=「(.*) 」
22\Find=^【+[^「 」]*」+$
22\Replace=\\0
22\Controls=PS AH DN
23\Name=示例/对称符号检查（嵌套类型）/# 嵌套类型的引号也表示双层引用，例如「...『 A』...『 B』...」，但它有时候错误地将内外层都使用相同对称引号，像「... 「A」...「 B」...」/
24\Name=示例/对称符号检查（嵌套类型）/中文引号双层嵌套
24\PreFind=“(.*) ”
24\Find=“([^“”]*)”
24\Replace=‘\\1’
24\Controls=PS AH DN
25\Name=示例/对称符号检查（嵌套类型）/日文引号双层嵌套
25\PreFind=「(.*) 」
25\Find=「([^「 」]*)」
25\Replace=『 \\1』
25\Controls=PS AH DN
size=25
